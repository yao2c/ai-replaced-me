<script>

const loadingMessages = [
  "正在扫描你的职业技能树...",
  "正在对比 GPT-5 的能力矩阵...",
  "正在计算你的工位存活概率...",
  "正在评估你的不可替代指数...",
  "正在生成你的AI替代报告...",
  "报告生成完毕，结果有点扎心..."
];

// ===== State =====
let currentQ = 0;
let scores = [];

// ===== Fake count =====
(function() {
  const base = 1283;
  const el = document.getElementById('fakeCount');
  const extra = Math.floor(Math.random() * 60);
  el.textContent = (base + extra).toLocaleString();
})();

// ===== Screen Management =====
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0, 0);
}

// ===== Quiz Logic =====
function startQuiz() {
  currentQ = 0;
  scores = [];
  showScreen('screenQuiz');
  renderQuestion();
}

function renderQuestion() {
  const q = questions[currentQ];
  document.getElementById('qNum').textContent = `${currentQ + 1}/10`;
  document.getElementById('progressFill').style.width = `${(currentQ / 10) * 100}%`;
  document.getElementById('qText').textContent = q.q;

  const labels = ['A', 'B', 'C', 'D'];
  const container = document.getElementById('optionsContainer');
  container.innerHTML = q.opts.map((opt, i) => `
    <div class="option" onclick="selectOption(${i}, ${opt.score})">
      <div class="option-label">${labels[i]}</div>
      <span>${opt.text}</span>
    </div>
  `).join('');

  // Re-trigger animation
  const qText = document.getElementById('qText');
  qText.style.animation = 'none';
  container.style.animation = 'none';
  requestAnimationFrame(() => {
    qText.style.animation = '';
    container.style.animation = '';
  });
}

function selectOption(idx, score) {
  const opts = document.querySelectorAll('.option');
  opts.forEach(o => o.classList.remove('selected'));
  opts[idx].classList.add('selected');

  scores.push(score);

  setTimeout(() => {
    currentQ++;
    if (currentQ < questions.length) {
      renderQuestion();
    } else {
      showLoading();
    }
  }, 350);
}

// ===== Loading Animation =====
function showLoading() {
  showScreen('screenLoading');
  const el = document.getElementById('loadingText');
  let msgIdx = 0;

  function typeMessage(text, cb) {
    el.textContent = '';
    let i = 0;
    const timer = setInterval(() => {
      el.textContent = text.substring(0, i + 1);
      i++;
      if (i >= text.length) {
        clearInterval(timer);
        setTimeout(cb, 400);
      }
    }, 50);
  }

  function nextMsg() {
    if (msgIdx < loadingMessages.length) {
      typeMessage(loadingMessages[msgIdx], () => {
        msgIdx++;
        nextMsg();
      });
    } else {
      showResult();
    }
  }
  nextMsg();
}

// ===== Result =====
function getResult(totalScore) {
  for (const r of results) {
    if (totalScore >= r.min && totalScore <= r.max) return r;
  }
  return results[results.length - 1];
}

function showResult() {
  const totalScore = scores.reduce((a, b) => a + b, 0);
  const percent = Math.round((totalScore - 10) / 30 * 100);
  const r = getResult(totalScore);

  const card = document.getElementById('resultCard');
  card.style.setProperty('--result-color', r.color);
  card.style.setProperty('--result-bg', r.bg);
  card.style.setProperty('--result-gradient', `linear-gradient(90deg, ${r.color}, ${r.color}88)`);
  document.getElementById('resultBadge').textContent = r.label;
  document.getElementById('resultDesc').textContent = r.desc;

  showScreen('screenResult');

  // Animate ring
  const circumference = 2 * Math.PI * 90;
  const offset = circumference - (percent / 100) * circumference;
  const ring = document.getElementById('ringProgress');
  ring.style.stroke = r.color;
  ring.style.filter = 'none';
  requestAnimationFrame(() => {
    ring.style.strokeDashoffset = offset;
  });

  // Eval bars
  const skillValue = 100 - percent;
  const dangerLevels = ['低', '中', '高', '极高'];
  const dangerIdx = Math.min(Math.floor((percent / 100) * 4), 3);
  const dangerLabel = dangerLevels[dangerIdx];
  const dangerPct = [20, 45, 72, 95][dangerIdx];

  const bars = [
    { bar: document.getElementById('evalBar0'), val: document.getElementById('evalVal0'), pct: skillValue, text: `${skillValue}%` },
    { bar: document.getElementById('evalBar1'), val: document.getElementById('evalVal1'), pct: dangerPct, text: dangerLabel },
  ];
  bars.forEach(({ bar, val, pct, text }) => {
    bar.style.background = r.color;
    setTimeout(() => { bar.style.width = pct + '%'; }, 100);
    val.textContent = text;
    val.style.color = r.color;
  });

  // Animate percent number
  const percentEl = document.getElementById('ringPercent');
  animateNumber(percentEl, 0, percent, 1500, r.color);
}

function animateNumber(el, from, to, duration, color) {
  const start = performance.now();
  function update(now) {
    const elapsed = now - start;
    const progress = Math.min(elapsed / duration, 1);
    const eased = 1 - Math.pow(1 - progress, 3);
    const current = Math.round(from + (to - from) * eased);
    el.innerHTML = `${current}<span class="ring-percent-sign" style="color:${color}">%</span>`;
    if (progress < 1) requestAnimationFrame(update);
  }
  requestAnimationFrame(update);
}

function restart() {
  document.getElementById('ringProgress').style.strokeDashoffset = 565;
  showScreen('screenLanding');
}

// ===== Save as Image (Canvas) =====
function saveImage() {
  const canvas = document.getElementById('shareCanvas');
  const dpr = 2;
  const w = 375;

  const totalScore = scores.reduce((a, b) => a + b, 0);
  const percent = Math.round((totalScore - 10) / 30 * 100);
  const r = getResult(totalScore);
  let ctx = canvas.getContext('2d');
  ctx.font = '13px sans-serif';
  const descLines = wrapText(ctx, r.desc, w - 68);
  const descStartY = 350;
  const descH = descLines.length * 20 + 24;
  const bottomY = descStartY + descH + 28;
  const watermarkY = bottomY + 30;
  const h = Math.ceil(watermarkY + 24);

  canvas.width = w * dpr;
  canvas.height = h * dpr;
  ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);

  // Background - soft white
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  roundRect(ctx, 0, 0, w, h, 20);
  ctx.fill();

  // Top gradient accent
  const grad = ctx.createLinearGradient(0, 0, w, 0);
  grad.addColorStop(0, r.color);
  grad.addColorStop(1, r.color + '66');
  ctx.save();
  ctx.beginPath();
  roundRect(ctx, 0, 0, w, h, 20);
  ctx.clip();
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, w, 5);
  ctx.restore();

  // Title
  ctx.fillStyle = '#8a978f';
  ctx.font = '500 13px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('▎ AI 替 代 指 数 报 告 ▎', w/2, 44);

  // Ring background
  const cx = w/2, cy = 165, radius = 70;
  ctx.beginPath();
  ctx.arc(cx, cy, radius, 0, Math.PI * 2);
  ctx.strokeStyle = '#e4ece5';
  ctx.lineWidth = 9;
  ctx.stroke();

  // Ring progress
  ctx.beginPath();
  const startAngle = -Math.PI / 2;
  const endAngle = startAngle + (percent / 100) * Math.PI * 2;
  ctx.arc(cx, cy, radius, startAngle, endAngle);
  ctx.strokeStyle = r.color;
  ctx.lineWidth = 9;
  ctx.lineCap = 'round';
  ctx.stroke();

  // Percent text
  ctx.fillStyle = r.color;
  ctx.font = 'bold 42px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText(`${percent}%`, cx, cy + 12);

  ctx.fillStyle = '#8a978f';
  ctx.font = '12px sans-serif';
  ctx.fillText('被替代概率', cx, cy + 32);

  // Badge
  ctx.fillStyle = r.color;
  ctx.font = 'bold 21px sans-serif';
  ctx.fillText(r.label, cx, 274);

  // Eval bars
  const skillValue = 100 - percent;
  const dangerLevels = ['低', '中', '高', '极高'];
  const dangerIdx = Math.min(Math.floor((percent / 100) * 4), 3);
  const dangerLabel = dangerLevels[dangerIdx];
  const dangerPct = [20, 45, 72, 95][dangerIdx];
  const imageBars = [
    { label: '技能价值', pct: skillValue, text: `${skillValue}%` },
    { label: '危险等级', pct: dangerPct, text: dangerLabel },
  ];
  const labelX = 110;
  const trackX = 120;
  const valueX = 230;
  const barTop = 296;
  const rowGap = 18;
  const trackWidth = 100;
  const trackHeight = 5;

  imageBars.forEach(({ label, pct, text }, index) => {
    const y = barTop + index * rowGap;
    ctx.fillStyle = '#8f9d94';
    ctx.font = '11px sans-serif';
    ctx.textAlign = 'right';
    ctx.fillText(label, labelX, y + 4);

    ctx.fillStyle = '#e4ece5';
    roundedBar(ctx, trackX, y, trackWidth, trackHeight, 99);

    ctx.fillStyle = r.color;
    roundedBar(ctx, trackX, y, trackWidth * (pct / 100), trackHeight, 99);

    ctx.font = 'bold 11px sans-serif';
    ctx.textAlign = 'left';
    ctx.fillText(text, valueX, y + 4);
  });

  // Description box
  ctx.fillStyle = '#8a978f';
  ctx.font = '13px sans-serif';
  ctx.textAlign = 'left';

  // desc background
  ctx.fillStyle = r.bg;
  ctx.beginPath();
  roundRect(ctx, 24, descStartY - 16, w - 48, descH, 12);
  ctx.fill();

  // left accent
  ctx.fillStyle = r.color;
  roundedBar(ctx, 24, descStartY - 16, 3, descH, 2);

  // desc text
  ctx.fillStyle = '#4f5d54';
  ctx.font = '13px sans-serif';
  descLines.forEach((line, i) => {
    ctx.fillText(line, 38, descStartY + 4 + i * 20);
  });

  // Share hint
  ctx.fillStyle = '#8a978f';
  ctx.font = '12px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('📱 长按截图分享给同事，让他们也焦虑一下', w/2, bottomY);

  // Watermark
  ctx.fillStyle = '#a5b1aa';
  ctx.font = '11px sans-serif';
  ctx.fillText('AI替代我了吗 · aivsme.pages.dev', w/2, watermarkY);

  // Download
  canvas.toBlob(blob => {
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `AI替代指数-${percent}%.png`;
    a.click();
    URL.revokeObjectURL(url);
    showToast('图片已保存，快去分享吧 🚀');
  }, 'image/png');
}

function roundRect(ctx, x, y, w, h, r) {
  const radius = Math.max(0, Math.min(r, w / 2, h / 2));
  ctx.moveTo(x + radius, y);
  ctx.lineTo(x + w - radius, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + radius);
  ctx.lineTo(x + w, y + h - radius);
  ctx.quadraticCurveTo(x + w, y + h, x + w - radius, y + h);
  ctx.lineTo(x + radius, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - radius);
  ctx.lineTo(x, y + radius);
  ctx.quadraticCurveTo(x, y, x + radius, y);
}

function roundedBar(ctx, x, y, w, h, r) {
  ctx.beginPath();
  roundRect(ctx, x, y, w, h, r);
  ctx.fill();
}

function wrapText(ctx, text, maxWidth) {
  const lines = [];
  let line = '';
  for (let i = 0; i < text.length; i++) {
    const testLine = line + text[i];
    if (ctx.measureText(testLine).width > maxWidth) {
      lines.push(line);
      line = text[i];
    } else {
      line = testLine;
    }
  }
  if (line) lines.push(line);
  return lines;
}

function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2500);
}
